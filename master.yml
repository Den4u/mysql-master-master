---
- name: Prepare all nodes
  hosts: all
  become: True
  vars_files:
    - secrets.yml  
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

- name: configure MySQL Master-Master
  hosts: mysql
  become: True
  vars_files:
    - secrets.yml

  roles:
    - dependencies
    - timezone
    - mysql
    - ufw
    - fail2ban

- name: Сonfigure HAProxy
  hosts: haproxy
  become: True
  vars_files:
    - secrets.yml

  roles:
    - timezone  
    - haproxy
    - ufw
    - fail2ban