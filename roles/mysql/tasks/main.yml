---
- name: Mysql install
  ansible.builtin.apt:
    name: mysql-server
    state: present

- name: Check mysql is enabled and started
  ansible.builtin.systemd:
    name: mysql
    state: started
    enabled: yes

- name: Removes anonymous user account for localhost
  community.mysql.mysql_user:
    name: ''
    host: localhost
    state: absent
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Create database user 'replica' with replication privileges
  community.mysql.mysql_user:
    name: "{{ replica_user }}"
    host: "{{ other_master_ip }}"
    password: "{{ mysql_replica_pass }}"
    priv: '*.*:REPLICATION SLAVE'
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Create mysqld.cnf
  ansible.builtin.template:
    src: templates/mysqld.cnf.j2
    dest: /etc/mysql/mysql.conf.d/mysqld.cnf
    mode: '0644'
  notify: Restart MySQL

- name: Apply MySQL configuration changes
  ansible.builtin.meta: flush_handlers

- name: Stop replica before configuration
  community.mysql.mysql_replication:
    mode: stopreplica
    login_unix_socket: /var/run/mysqld/mysqld.sock
  failed_when: false

- name: Configure replication slave with GTID auto position
  community.mysql.mysql_replication:
    mode: changeprimary
    master_host: "{{ other_master_ip }}"
    master_user: "{{ replica_user }}"
    master_password: "{{ mysql_replica_pass }}"
    master_auto_position: true
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Start replication
  community.mysql.mysql_replication:
    mode: startreplica
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Check replication status
  community.mysql.mysql_replication:
    mode: getreplica
    login_unix_socket: /var/run/mysqld/mysqld.sock
  register: replica_status
  tags: check_replication

- name: Assert replication is healthy
  ansible.builtin.assert:
    that:
      - replica_status.Replica_IO_Running == 'Yes'
      - replica_status.Replica_SQL_Running == 'Yes'
    success_msg: "Replication on {{ inventory_hostname }} is healthy!"
    fail_msg: >
                Replication error!
                IO: {{ replica_status.Replica_IO_Running }},
                SQL: {{ replica_status.Replica_SQL_Running }}
  tags: check_replication