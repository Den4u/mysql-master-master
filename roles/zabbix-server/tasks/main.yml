---
- name: Create directory for docker-compose
  ansible.builtin.file:
    path: /opt/monitoring
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Create .env file for secrets
  ansible.builtin.template:
    src: templates/.env.j2
    dest: /opt/monitoring/.env
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'

- name: Generate docker-compose.yml
  ansible.builtin.template:
    src: templates/docker-compose.yml.j2
    dest: /opt/monitoring/docker-compose.yml
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'

- name: Ensure monitoring stack is in the desired state
  community.docker.docker_compose_v2:
    project_src: /opt/monitoring
    state: present
  notify: Apply monitoring stack configuration changes


