---
- name: Install UFW package
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: yes

- name: Configure UFW allow rules
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: tcp
    src: "{{ item.src }}"
  loop: "{{ ufw_rules }}"

- name: Set UFW default policies (deny incoming, allow outgoing)
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Ensure UFW service is enabled and started
  ansible.builtin.systemd:
    name: ufw
    state: started
    enabled: true